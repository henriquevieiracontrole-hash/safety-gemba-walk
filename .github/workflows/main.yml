name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build APK
        run: |
          cd rork-safety-gemba-walk-app-ajustado/rork-safety-gemba-walk-app-main/Android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: rork-safety-gemba-walk-app-ajustado/rork-safety-gemba-walk-app-main/Android/app/build/outputs/apk/debug/*.apk
